<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>統計検定2級 道場 | 理論・概念クイズ</title>
  <meta name="description" content="統計検定2級の理論・概念を網羅した4択クイズ道場。分野別に選んで効率よく学習できます。全30問。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

  <!-- KaTeX CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="document.dispatchEvent(new Event('katex-ready'))"></script>


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=1.2" />
</head>
<body>
  <!-- Theme Toggle -->
  <button id="themeToggle" class="theme-toggle" aria-label="テーマ切替">🌙</button>

  <!-- ══════════════════════════════════
       SCREEN 1: START / CATEGORY SELECT
       ══════════════════════════════════ -->
  <div id="screenStart">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-badge">📊 統計検定 2級</div>
        <h1 class="hero-title">統計検定2級<br><span class="hero-title-accent">道場</span></h1>
        <p class="hero-subtitle">学習する分野を選んで、演習を開始しましょう</p>
      </div>
      <div class="hero-wave">
        <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="var(--color-bg)"/>
        </svg>
      </div>
    </div>

    <!-- Category Selection -->
    <div class="start-body">
      <div class="start-container">

        <div class="section-header">
          <h2 class="section-title">学習範囲の選択</h2>
          <div class="select-controls">
            <button id="btnSelectAll" class="btn-ctrl">全て選択</button>
            <button id="btnDeselectAll" class="btn-ctrl btn-ctrl--ghost">全て解除</button>
          </div>
        </div>

        <!-- Category cards generated by JS -->
        <div id="categoryGrid" class="category-grid"></div>

        <!-- Options Section -->
        <div class="options-section" style="margin-bottom: 24px; margin-top: 10px;">
          <h3 style="font-size: 1rem; border-bottom: 1px solid var(--color-border); padding-bottom: 8px; margin-bottom: 16px;">オプション項目</h3>
          <div class="options-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px;">
            <label class="option-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--color-text);">
              <input type="checkbox" id="optOnlyFormula" style="width: 18px; height: 18px; accent-color: var(--color-primary);" />
              <span style="font-size: 0.95rem;">定義式を求める問題のみを出題する</span>
            </label>
          </div>
        </div>

        <!-- Summary + Start -->
        <div class="start-footer">
          <div class="selection-summary">
            <span id="summaryText" class="summary-text">0 分野 ／ 0 問 を選択中</span>
          </div>
          <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end;">
            <button id="btnStart10" class="btn-start btn-start--ghost" disabled>
              10問抽出して開始
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <button id="btnStart" class="btn-start" disabled>
              選択した範囲で開始
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <footer class="site-footer-start">
      統計検定2級 道場 &nbsp;|&nbsp; 全 30 問 &nbsp;|&nbsp; 6 分野
    </footer>
  </div>


  <!-- ══════════════════════════════════
       SCREEN 2: QUIZ
       ══════════════════════════════════ -->
  <div id="screenQuiz" hidden>

    <!-- Quiz Header -->
    <header class="quiz-header">
      <div class="quiz-header-inner">
        <button id="btnBackToStart" class="btn-back">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          ホームに戻る
        </button>
        <span class="quiz-header-title">統計検定2級 道場</span>
        <div class="quiz-header-score">
          <span id="hdrScoreCorrect">0</span>/<span id="hdrScoreTotal">0</span> 正解
        </div>
      </div>
    </header>

    <main class="quiz-main">

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-info">
          <span id="progressLabel" class="progress-label">問題 1 / 10</span>
          <span id="progressPct" class="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Quiz Card -->
      <div id="quizCard" class="quiz-card">
        <div class="question-meta">
          <span id="questionBadge" class="q-badge">Q1</span>
          <span id="categoryBadge" class="cat-badge">カテゴリ</span>
          <span id="idBadge" class="id-badge">ID: --</span>
        </div>

        <div id="questionText" class="question-text"></div>

        <div id="optionsContainer" class="options-container"></div>

        <!-- Feedback (shown after answering) -->
        <div id="feedbackArea" class="feedback-area">
          <div id="feedbackInner" class="feedback-inner">
            <div id="feedbackVerdict" class="feedback-verdict"></div>
            <div id="feedbackCorrectNote" class="feedback-correct-note" hidden></div>
            <div class="feedback-section-label">解説</div>
            <div id="feedbackRationale" class="feedback-rationale"></div>
          </div>
        </div>

        <!-- Nav -->
        <div class="nav-area" style="display: flex; justify-content: space-between; align-items: center;">
          <button id="btnPrev" class="btn-prev" disabled style="visibility: hidden;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            前の問題へ
          </button>
          <button id="btnNext" class="btn-next" disabled>
            次の問題へ
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>

    </main>
  </div>


  <!-- ══════════════════════════════════
       SCREEN 3: RESULT
       ══════════════════════════════════ -->
  <div id="screenResult" hidden>
    <div class="result-wrapper">
      <div class="result-card">
        <div id="resultEmoji" class="result-emoji">🏆</div>
        <h2 class="result-title">お疲れさまでした！</h2>

        <div class="result-score-box">
          <div class="result-score-display">
            <span id="resultCorrect" class="result-num">0</span>
            <span class="result-denom">問正解</span>
          </div>
          <div class="result-score-sub">
            全 <span id="resultTotal">0</span> 問中
            &nbsp;|&nbsp;
            正解率 <span id="resultPct" class="result-pct-text">0</span>%
          </div>
        </div>

        <p id="resultMessage" class="result-message"></p>

        <!-- Category Breakdown -->
        <div class="breakdown-section">
          <h3 class="breakdown-title">分野別スコア</h3>
          <div id="breakdownList" class="breakdown-list"></div>
        </div>

        <!-- Result Details List -->
        <div class="result-details-section">
          <h3 class="breakdown-title" style="margin-top: 32px;">各問題の振り返り</h3>
          <div id="resultDetailsList" class="result-details-list"></div>
        </div>

        <div class="result-actions">
          <button id="btnRetry" class="btn-retry">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.87"/></svg>
            同じ範囲でもう一度
          </button>
          <button id="btnGoStart" class="btn-retry btn-retry--ghost">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ホーム画面に戻る
          </button>
        </div>
      </div>
    </div>
  </div>




  <script src="data.js?v=1.21"></script>
  <script src="quiz.js?v=1.5"></script>
</body>
</html>
